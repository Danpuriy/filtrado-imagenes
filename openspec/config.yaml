# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Python 3.9+, Streamlit 1.28+, OpenCV, NumPy, Matplotlib
  Architecture: Single-page Streamlit app with filtrado/ package (core processing + display), plus app.py entrypoint
  Testing: pytest 8.4.2 — 30 unit tests across validation, cropping, mean/median/laplacian/sobel filters
  Style: Type-annotated pure functions returning np.ndarray; functions are stateless and deterministic
  Domain: Digital image processing for university coursework — mean/median/laplacian/sobel filters with 15×15 crop requirement

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns — pure functions, type annotations, numpy/cv2
    tdd: true
    test_command: "python -m pytest tests/ -v"
  verify:
    test_command: "python -m pytest tests/ -v"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
